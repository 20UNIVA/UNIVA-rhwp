<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>rhwp-studio i18n 시각 검증 데모</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1e1e1e; color: #e0e0e0; }
    body { display: flex; flex-direction: column; }
    header { padding: 12px 20px; background: #2d2d2d; border-bottom: 1px solid #3d3d3d; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    h1 { font-size: 16px; font-weight: 500; color: #fafafa; }
    .lang-buttons { display: flex; gap: 8px; }
    .lang-btn { padding: 8px 16px; border: 1px solid #555; background: #3a3a3a; color: #e0e0e0; border-radius: 4px; cursor: pointer; font-size: 14px; transition: background 0.15s; }
    .lang-btn:hover { background: #4a4a4a; }
    .lang-btn.active { background: #0e639c; border-color: #007acc; color: white; }
    .status { font-size: 13px; color: #9d9d9d; margin-left: auto; }
    .status code { background: #3a3a3a; padding: 2px 6px; border-radius: 3px; color: #ffd700; }
    main { flex: 1; padding: 12px 20px; }
    iframe { width: 100%; height: 100%; border: 1px solid #3d3d3d; border-radius: 4px; background: white; }
  </style>
</head>
<body>
  <header>
    <h1>rhwp-studio i18n 데모</h1>
    <div class="lang-buttons">
      <button class="lang-btn" data-lang="ko">한국어 (ko)</button>
      <button class="lang-btn" data-lang="en">English (en)</button>
      <button class="lang-btn" data-lang="ja">日本語 (ja)</button>
    </div>
    <div class="status">
      현재 lang: <code id="current-lang">ko</code> &nbsp;|&nbsp;
      메시지: <code id="last-msg">(아직 박지 않음)</code>
    </div>
  </header>
  <main>
    <iframe
      id="rhwp"
      src="http://localhost:7700/hwp/?sysLang=ko&parentOrigin=http://localhost:8081"
      allow="clipboard-read; clipboard-write"
    ></iframe>
  </main>

  <script>
    const RHWP_ORIGIN = 'http://localhost:7700';
    const iframe = document.getElementById('rhwp');
    const currentLangEl = document.getElementById('current-lang');
    const lastMsgEl = document.getElementById('last-msg');
    const buttons = document.querySelectorAll('.lang-btn');

    function setLang(lang) {
      // postMessage 박은 자체
      const message = { type: 'rhwp:set-locale', sysLang: lang };
      iframe.contentWindow?.postMessage(message, RHWP_ORIGIN);
      currentLangEl.textContent = lang;
      lastMsgEl.textContent = JSON.stringify(message);

      // active 버튼 갱신
      buttons.forEach((b) => b.classList.toggle('active', b.dataset.lang === lang));
    }

    buttons.forEach((b) => {
      b.addEventListener('click', () => setLang(b.dataset.lang));
    });

    // 초기 자체 ko 박은 자체
    document.querySelector('[data-lang="ko"]').classList.add('active');

    // iframe 자체 박은 자체 (필요 시 디버그)
    window.addEventListener('message', (e) => {
      if (e.origin !== RHWP_ORIGIN) return;
      console.log('[demo] from rhwp:', e.data);
    });
  </script>
</body>
</html>
